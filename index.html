<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>دفتر الحضور والأجور</title>
    <meta name="theme-color" content="#2B2620" />
    <meta name="description" content="دفتر حضور وأجور للعمال - تسجيل حضور بالساعات وحساب الرواتب شهرياً" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="icon" href="icon-192.png" />
    <style>
        /* ===== الواردات والثوابت ===== */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Lalezar&display=swap');

        :root {
            --paper: #EAE3D3;
            --paperDark: #DED2AF;
            --paperLine: #C9BC93;
            --ink: #2B2620;
            --inkSoft: #5A5145;
            --oxblood: #8B2E2E;
            --orange: #E0631F;
            --green: #3F6B3D;
            --blue: #35607A;
            --amber: #B8811F;
            --radius: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, .1);
            --font: 'Cairo', Tahoma, sans-serif;
            --display: 'Lalezar', 'Cairo', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: var(--paper);
            font-family: var(--font);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .display {
            font-family: var(--display);
        }

        /* ===== أزرار ===== */
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            font-size: inherit;
        }

        .btn-primary {
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-weight: 700;
            transition: background .2s, transform .12s;
        }
        .btn-primary:hover {
            background: #c45318;
        }
        .btn-primary:active {
            transform: scale(.94);
        }

        .btn-ghost {
            background: transparent;
            border: 1.5px solid var(--paperLine);
            border-radius: 6px;
            padding: 8px 14px;
            transition: background .2s, border-color .2s;
        }
        .btn-ghost:hover {
            background: rgba(43, 38, 32, .06);
        }

        .btn-danger {
            background: var(--oxblood);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-weight: 600;
            transition: background .2s;
        }
        .btn-danger:hover {
            background: #6f2323;
        }

        .btn-success {
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-weight: 600;
        }

        .stamp-btn {
            transition: transform .1s ease;
        }
        .stamp-btn:active {
            transform: scale(.8) rotate(-3deg);
        }

        /* ===== حقول الإدخال ===== */
        .field {
            padding: 10px 12px;
            border: 1.5px solid var(--paperLine);
            border-radius: 6px;
            font-family: var(--font);
            background: #fff;
            color: var(--ink);
            transition: border-color .2s, box-shadow .2s;
            font-size: 14px;
            width: 100%;
        }
        .field:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(224, 99, 31, .2);
        }
        .field::placeholder {
            color: var(--inkSoft);
            opacity: .6;
        }

        /* ===== علامات التبويب ===== */
        .tab-btn {
            padding: 8px 20px;
            border: 2px solid var(--ink);
            border-radius: 8px 8px 0 0;
            font-weight: 700;
            font-size: 14px;
            background: transparent;
            color: var(--ink);
            transition: background .2s, color .2s;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            background: var(--ink);
            color: var(--paper);
        }
        .tab-btn:not(.active):hover {
            background: rgba(43, 38, 32, .06);
        }

        /* ===== بطاقات ===== */
        .card {
            background: #fff;
            border: 1px solid var(--paperLine);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
        }

        /* ===== جداول ===== */
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }
        th,
        td {
            padding: 6px 8px;
            border-bottom: 1px solid var(--paperLine);
            text-align: center;
            vertical-align: middle;
        }
        th {
            background: var(--paperDark);
            font-weight: 700;
            font-size: 12px;
            color: var(--ink);
            border-bottom: 2px solid var(--ink);
        }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--paperLine);
            border-radius: var(--radius);
            background: #fff;
        }

        /* ===== دوائر الحضور ===== */
        .dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .dot.empty {
            background: #fff;
            border: 2px dashed var(--paperLine);
            color: var(--inkSoft);
            font-weight: 400;
        }
        .dot:not(.empty):hover {
            box-shadow: 0 0 0 3px rgba(43, 38, 32, .15);
        }
        .dot.empty:hover {
            border-color: var(--orange);
            background: rgba(224, 99, 31, .06);
        }

        /* ===== نافذة منبثقة ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(43, 38, 32, .55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn .2s ease;
        }
        .modal {
            background: var(--paper);
            border: 2px solid var(--ink);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
            animation: slideUp .25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== توست ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ink);
            color: var(--paper);
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .3);
            z-index: 50;
            max-width: 92%;
            text-align: center;
            animation: toastIn .3s ease;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px) scale(.94);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        /* ===== تذييل ===== */
        .footer-link {
            background: transparent;
            border: none;
            color: var(--inkSoft);
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline dotted;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background .2s;
        }
        .footer-link:hover {
            background: rgba(43, 38, 32, .06);
        }

        /* ===== مطبوعات ===== */
        @media print {
            .no-print {
                display: none !important;
            }
            body,
            div {
                background: white !important;
            }
            .card {
                box-shadow: none !important;
                border: 1px solid #ccc !important;
            }
            .table-wrap {
                border: 1px solid #ccc !important;
            }
            th {
                background: #eee !important;
            }
            .dot {
                border: 1px solid #999 !important;
            }
            .dot.empty {
                border: 1px dashed #999 !important;
                background: #f9f9f9 !important;
            }
            .modal,
            .overlay {
                display: none !important;
            }
            .toast {
                display: none !important;
            }
        }

        /* ===== استجابة ===== */
        @media (max-width: 600px) {
            .tab-btn {
                font-size: 12px;
                padding: 6px 12px;
            }
            .dot {
                width: 28px;
                height: 28px;
                font-size: 10px;
            }
            .field {
                font-size: 13px;
                padding: 8px 10px;
            }
            .card {
                padding: 12px;
            }
            .modal {
                padding: 18px;
                max-width: 340px;
            }
            th,
            td {
                padding: 4px 6px;
                font-size: 12px;
            }
        }

        @media (max-width: 400px) {
            .dot {
                width: 24px;
                height: 24px;
                font-size: 9px;
            }
            .tab-btn {
                font-size: 11px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        "use strict";

        /* ============================================================
               الحالة والبيانات
               ============================================================ */
        var DEFAULT_DATA = {
            companyName: "ورشتي",
            workers: [],
            attendance: {}, // key: "workerId:YYYY-MM" → { "1": 8, "2": 0, ... }
            advances: {}, // key: "workerId:YYYY-MM" → number
            overtime: {} // key: "workerId:YYYY-MM" → number
        };

        function loadData() {
            try {
                var raw = localStorage.getItem("ledger-data");
                if (raw) {
                    var parsed = JSON.parse(raw);
                    // ضمان وجود كل الحقول
                    for (var k in DEFAULT_DATA) {
                        if (!(k in parsed)) parsed[k] = DEFAULT_DATA[k];
                    }
                    return parsed;
                }
            } catch (_) { /* تجاهل */ }
            return JSON.parse(JSON.stringify(DEFAULT_DATA));
        }

        var data = loadData();

        var ui = {
            tab: "workers", // "workers" | "attendance" | "payroll"
            year: new Date().getFullYear(),
            month: new Date().getMonth() + 1,
            editingId: null,
            dayModal: null, // { workerId, workerName, day, value }
            confirmModal: null, // { message, onYes }
            toast: null,
            savingFlash: false,
        };

        /* ============================================================
               دوال الحفظ
               ============================================================ */
        function saveData() {
            try {
                localStorage.setItem("ledger-data", JSON.stringify(data));
            } catch (e) {
                console.error("فشل الحفظ:", e);
            }
        }

        function persist(next) {
            data = next;
            saveData();
            ui.savingFlash = true;
            render();
            setTimeout(function() {
                ui.savingFlash = false;
                render();
            }, 600);
        }

        function notify(msg) {
            ui.toast = msg;
            render();
            clearTimeout(ui._toastTimer);
            ui._toastTimer = setTimeout(function() {
                if (ui.toast === msg) {
                    ui.toast = null;
                    render();
                }
            }, 2200);
        }

        function askConfirm(message, onYes) {
            ui.confirmModal = { message: message, onYes: onYes };
            render();
        }

        /* ============================================================
               أدوات مساعدة
               ============================================================ */
        var MONTHS_AR = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو",
            "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"
        ];

        function esc(s) {
            return String(s == null ? "" : s)
                .replace(/[&<>"']/g, function(c) {
                    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" } [c];
                });
        }

        function uid() {
            return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        }

        function fmt(n) {
            return new Intl.NumberFormat("ar-EG", { maximumFractionDigits: 2 }).format(n || 0);
        }

        function daysInMonth(y, m) {
            return new Date(y, m, 0).getDate();
        }

        function attKey(workerId, y, m) {
            return workerId + ":" + y + "-" + String(m).padStart(2, "0");
        }

        function daysHoursLabel(totalHours) {
            var d = Math.floor(totalHours / 8);
            var h = Math.round((totalHours - d * 8) * 100) / 100;
            var parts = [];
            if (d > 0) parts.push(d + " يوم");
            if (h > 0 || parts.length === 0) parts.push(fmt(h) + " ساعة");
            return parts.join(" و ");
        }

        function dayCellStyle(hours) {
            if (hours === undefined || hours === null || hours === "") {
                return { fill: "transparent", color: "var(--inkSoft)", empty: true, label: "" };
            }
            if (hours === 0) {
                return { fill: "var(--oxblood)", color: "#fff", empty: false, label: "✕" };
            }
            if (hours < 8) {
                return { fill: "var(--amber)", color: "#fff", empty: false, label: String(hours) };
            }
            if (hours === 8) {
                return { fill: "var(--green)", color: "#fff", empty: false, label: String(hours) };
            }
            return { fill: "var(--blue)", color: "#fff", empty: false, label: String(hours) };
        }

        /* ============================================================
               عمليات العمال
               ============================================================ */
        function addWorker() {
            var nameEl = document.getElementById("new-worker-name");
            var rateEl = document.getElementById("new-worker-rate");
            var name = nameEl.value.trim();
            var rate = parseFloat(rateEl.value);
            if (!name) { notify("يرجى إدخال اسم العامل"); return; }
            if (!rate || rate <= 0) { notify("يرجى إدخال سعر يوم عمل صحيح"); return; }
            var w = { id: uid(), name: name, rate: rate };
            persist(Object.assign({}, data, { workers: data.workers.concat([w]) }));
            nameEl.value = "";
            rateEl.value = "";
            notify("✓ تم إضافة العامل: " + name);
        }

        function startEdit(id) {
            ui.editingId = id;
            render();
        }

        function cancelEdit() {
            ui.editingId = null;
            render();
        }

        function saveEdit(id) {
            var w = data.workers.find(function(x) { return x.id === id; });
            if (!w) return;
            var nameEl = document.getElementById("edit-name-" + id);
            var rateEl = document.getElementById("edit-rate-" + id);
            var newName = nameEl.value.trim() || w.name;
            var newRate = parseFloat(rateEl.value) || w.rate;
            if (newRate <= 0) { notify("سعر اليوم يجب أن يكون أكبر من صفر"); return; }
            askConfirm('سيتم تعديل بيانات العامل "' + esc(w.name) + '". هل تريد المتابعة؟', function() {
                var workers = data.workers.map(function(x) {
                    return x.id === id ? Object.assign({}, x, { name: newName, rate: newRate }) : x;
                });
                persist(Object.assign({}, data, { workers: workers }));
                ui.editingId = null;
                notify("تم حفظ تعديل بيانات العامل");
            });
        }

        function deleteWorker(id) {
            var w = data.workers.find(function(x) { return x.id === id; });
            if (!w) return;
            askConfirm('تحذير: سيتم حذف العامل "' + esc(w.name) + '" وكل سجل حضوره وأجوره نهائياً ولا يمكن التراجع. هل أنت متأكد؟',
                function() {
                    var workers = data.workers.filter(function(x) { return x.id !== id; });
                    var attendance = Object.assign({}, data.attendance);
                    var advances = Object.assign({}, data.advances);
                    var overtime = Object.assign({}, data.overtime);
                    Object.keys(attendance).forEach(function(k) {
                        if (k.indexOf(id + ":") === 0) delete attendance[k];
                    });
                    Object.keys(advances).forEach(function(k) {
                        if (k.indexOf(id + ":") === 0) delete advances[k];
                    });
                    Object.keys(overtime).forEach(function(k) {
                        if (k.indexOf(id + ":") === 0) delete overtime[k];
                    });
                    persist(Object.assign({}, data, {
                        workers: workers,
                        attendance: attendance,
                        advances: advances,
                        overtime: overtime
                    }));
                    notify('تم حذف العامل "' + esc(w.name) + '"');
                });
        }

        /* ============================================================
               الحضور
               ============================================================ */
        function openDayModal(workerId, day) {
            var w = data.workers.find(function(x) { return x.id === workerId; });
            if (!w) return;
            var key = attKey(workerId, ui.year, ui.month);
            var existing = (data.attendance[key] || {})[String(day)];
            ui.dayModal = {
                workerId: workerId,
                workerName: w.name,
                day: day,
                value: existing === undefined ? "" : String(existing)
            };
            render();
            setTimeout(function() {
                var el = document.getElementById("day-modal-input");
                if (el) { el.focus();
                    el.select(); }
            }, 50);
        }

        function closeDayModal() {
            ui.dayModal = null;
            render();
        }

        function saveDayModal() {
            var m = ui.dayModal;
            if (!m) return;
            var valEl = document.getElementById("day-modal-input");
            if (!valEl) return;
            var raw = valEl.value.trim();
            var key = attKey(m.workerId, ui.year, ui.month);
            var monthData = Object.assign({}, data.attendance[key] || {});
            var dayStr = String(m.day);

            // إذا كان الحقل فارغاً → حذف
            if (raw === "" || raw === null || raw === undefined) {
                delete monthData[dayStr];
            } else {
                var hours = parseFloat(raw);
                if (isNaN(hours) || hours < 0) {
                    notify("الرجاء إدخال عدد ساعات صحيح (0 أو أكثر)");
                    return;
                }
                // نقوم بتخزين القيمة كما هي (يمكن أن تكون 0)
                monthData[dayStr] = hours;
            }

            var attendance = Object.assign({}, data.attendance);
            if (Object.keys(monthData).length > 0) {
                attendance[key] = monthData;
            } else {
                delete attendance[key];
            }

            persist(Object.assign({}, data, { attendance: attendance }));
            var msg = raw === "" || raw === null || raw === undefined ?
                "تم مسح تسجيل يوم " + m.day + " — " + m.workerName :
                "✓ تم تسجيل يوم " + m.day + ": " + fmt(parseFloat(raw) || 0) + " ساعة — " + m.workerName;
            notify(msg);
            ui.dayModal = null;
            // render سيتم استدعاؤها بواسطة persist
        }

        function setAdvance(workerId, value) {
            var key = attKey(workerId, ui.year, ui.month);
            var advances = Object.assign({}, data.advances);
            var v = parseFloat(value);
            if (isNaN(v) || v === 0) {
                delete advances[key];
            } else {
                advances[key] = v;
            }
            persist(Object.assign({}, data, { advances: advances }));
            notify("تم تحديث السلفة/الخصم");
        }

        function setOvertime(workerId, value) {
            var key = attKey(workerId, ui.year, ui.month);
            var overtime = Object.assign({}, data.overtime);
            var v = parseFloat(value);
            if (isNaN(v) || v === 0) {
                delete overtime[key];
            } else {
                overtime[key] = v;
            }
            persist(Object.assign({}, data, { overtime: overtime }));
            notify("تم تحديث الساعات الإضافية");
        }

        function changeMonth(delta) {
            var m = ui.month + delta;
            var y = ui.year;
            if (m > 12) { m = 1;
                y++; }
            if (m < 1) { m = 12;
                y--; }
            ui.month = m;
            ui.year = y;
            render();
        }

        function setCompanyName(value) {
            var name = value.trim() || "ورشتي";
            persist(Object.assign({}, data, { companyName: name }));
        }

        /* ============================================================
               حساب الرواتب
               ============================================================ */
        function computePayroll() {
            var nDays = daysInMonth(ui.year, ui.month);
            return data.workers.map(function(w) {
                var key = attKey(w.id, ui.year, ui.month);
                var monthData = data.attendance[key] || {};
                var workedHours = 0;
                var absentDays = 0;
                for (var d = 1; d <= nDays; d++) {
                    var h = monthData[String(d)];
                    if (h === undefined) continue;
                    if (h === 0) absentDays++;
                    else workedHours += h;
                }
                var hourlyRate = w.rate / 8;
                var paidDays = workedHours / 8;
                var basePay = workedHours * hourlyRate;
                var overtimeHours = data.overtime[key] || 0;
                var overtimePay = overtimeHours * hourlyRate;
                var gross = basePay + overtimePay;
                var advance = data.advances[key] || 0;
                var net = gross - advance;
                var totalHoursEquivalent = workedHours + overtimeHours;
                return {
                    worker: w,
                    workedHours: workedHours,
                    absentDays: absentDays,
                    paidDays: paidDays,
                    basePay: basePay,
                    overtimeHours: overtimeHours,
                    overtimePay: overtimePay,
                    gross: gross,
                    advance: advance,
                    net: net,
                    totalHoursEquivalent: totalHoursEquivalent
                };
            });
        }

        function computeTotals(payroll) {
            return payroll.reduce(function(acc, p) {
                return {
                    basePay: acc.basePay + p.basePay,
                    overtimePay: acc.overtimePay + p.overtimePay,
                    gross: acc.gross + p.gross,
                    advance: acc.advance + p.advance,
                    net: acc.net + p.net
                };
            }, { basePay: 0, overtimePay: 0, gross: 0, advance: 0, net: 0 });
        }

        /* ============================================================
               الرسم (Render)
               ============================================================ */
        function render() {
            var app = document.getElementById("app");
            if (!app) return;
            app.innerHTML = viewHeader() + viewMain() + viewModals();
            // ربط الأحداث الديناميكية للحقول التي تستخدم "data-commit"
            bindInputs();
        }

        /* ===== عرض الرأس ===== */
        function viewHeader() {
            return '' +
                '<header class="no-print" style="padding:18px 16px 12px;border-bottom:3px double var(--ink);">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">' +
                '<div>' +
                '<div class="display" style="font-size:28px;color:var(--orange);letter-spacing:0.5px;">دفتر الحضور والأجور</div>' +
                '<input id="company-name-input" data-commit="company" value="' + esc(data.companyName) + '" placeholder="اسم الورشة / المحل" ' +
                'style="background:transparent;border:none;border-bottom:1.5px dashed var(--inkSoft);color:var(--inkSoft);font-size:15px;padding:4px 0;font-family:var(--font);width:200px;" />' +
                '</div>' +
                '<div style="font-size:12px;color:' + (ui.savingFlash ? "var(--green)" : "var(--inkSoft)") + ';min-height:20px;font-weight:600;">' +
                (ui.savingFlash ? "✓ تم الحفظ" : "") +
                '</div>' +
                '</div>' +
                '<nav style="display:flex;gap:4px;margin-top:14px;flex-wrap:wrap;">' +
                ["workers", "attendance", "payroll"].map(function(t) {
                    var labels = { workers: "العمّال", attendance: "الحضور", payroll: "كشف الرواتب" };
                    var active = ui.tab === t ? "active" : "";
                    return '<button class="tab-btn ' + active + '" data-action="set-tab" data-tab="' + t + '">' +
                        labels[t] + '</button>';
                }).join("") +
                '</nav>' +
                '</header>';
        }

        /* ===== عرض المحتوى الرئيسي ===== */
        function viewMain() {
            var body = "";
            if (ui.tab === "workers") body = viewWorkers();
            else if (ui.tab === "attendance") body = viewAttendance();
            else if (ui.tab === "payroll") body = viewPayroll();

            return '<main style="padding:16px;max-width:1100px;margin:0 auto;flex:1;">' +
                body +
                '<footer class="no-print" style="margin-top:32px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">' +
                '<button class="footer-link" data-action="reset-all">↺ إعادة تعيين كل البيانات</button>' +
                '<span style="color:var(--paperLine);">|</span>' +
                '<span style="font-size:11px;color:var(--inkSoft);">' + data.workers.length + ' عامل</span>' +
                '</footer>' +
                '</main>';
        }

        /* ===== تبويب العمال ===== */
        function viewWorkers() {
            var addBox = '<div class="card" style="margin-bottom:16px;">' +
                '<h3 style="margin:0 0 10px;font-size:15px;font-weight:700;">➕ إضافة عامل جديد</h3>' +
                '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">' +
                '<input id="new-worker-name" class="field" placeholder="اسم العامل" style="flex:1 1 160px;" />' +
                '<input id="new-worker-rate" class="field" type="number" inputmode="decimal" placeholder="سعر اليوم" style="width:130px;" />' +
                '<button class="btn-primary" data-action="add-worker" style="white-space:nowrap;">+ إضافة</button>' +
                '</div>' +
                '<div style="font-size:11px;color:var(--inkSoft);margin-top:6px;">سعر اليوم = 8 ساعات عمل</div>' +
                '</div>';

            if (data.workers.length === 0) {
                return addBox +
                    '<div style="text-align:center;padding:40px 20px;color:var(--inkSoft);">' +
                    '<div style="font-size:48px;margin-bottom:12px;">👷</div>' +
                    '<p>لا يوجد عمال بعد. أضف أول عامل من الأعلى.</p>' +
                    '</div>';
            }

            var list = data.workers.map(function(w) {
                if (ui.editingId === w.id) {
                    return '<div class="card" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">' +
                        '<div style="display:flex;gap:8px;flex:1;min-width:200px;">' +
                        '<input id="edit-name-' + w.id + '" class="field" value="' + esc(w.name) + '" style="flex:1;" />' +
                        '<input id="edit-rate-' + w.id + '" class="field" type="number" value="' + w.rate + '" style="width:110px;" />' +
                        '</div>' +
                        '<button class="btn-success" data-action="save-edit" data-id="' + w.id + '">✔ حفظ</button>' +
                        '<button class="btn-ghost" data-action="cancel-edit">✕ إلغاء</button>' +
                        '</div>';
                }
                return '<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap;">' +
                    '<div><div style="font-weight:700;font-size:15px;">' + esc(w.name) + '</div>' +
                    '<div style="font-size:13px;color:var(--inkSoft);">' + fmt(w.rate) + ' / يوم</div></div>' +
                    '<div style="display:flex;gap:6px;">' +
                    '<button class="btn-ghost" data-action="start-edit" data-id="' + w.id + '" style="padding:6px 12px;">✏️ تعديل</button>' +
                    '<button class="btn-ghost" style="border-color:var(--oxblood);color:var(--oxblood);padding:6px 12px;" data-action="delete-worker" data-id="' + w.id + '">🗑 حذف</button>' +
                    '</div>' +
                    '</div>';
            }).join("");

            return addBox + '<div style="margin-top:4px;">' + list + '</div>';
        }

        /* ===== منتقي الشهر ===== */
        function viewMonthPicker() {
            return '<div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 14px;flex-wrap:wrap;">' +
                '<button class="btn-ghost" data-action="change-month" data-delta="1" style="font-size:18px;padding:4px 14px;">›</button>' +
                '<div class="display" style="font-size:24px;min-width:160px;text-align:center;color:var(--ink);">' +
                MONTHS_AR[ui.month - 1] + ' ' + ui.year +
                '</div>' +
                '<button class="btn-ghost" data-action="change-month" data-delta="-1" style="font-size:18px;padding:4px 14px;">‹</button>' +
                '</div>';
        }

        /* ===== تبويب الحضور ===== */
        function viewAttendance() {
            var out = viewMonthPicker();

            if (data.workers.length === 0) {
                return out +
                    '<div style="text-align:center;padding:40px 20px;color:var(--inkSoft);">' +
                    '<div style="font-size:48px;margin-bottom:12px;">📋</div>' +
                    '<p>أضف عمالاً أولاً من تبويب "العمّال".</p>' +
                    '</div>';
            }

            var legendItems = [
                { fill: "transparent", empty: true, t: "لم يُسجَّل" },
                { fill: "var(--oxblood)", t: "غائب (0)" },
                { fill: "var(--amber)", t: "دوام جزئي (<8)" },
                { fill: "var(--green)", t: "يوم كامل (8)" },
                { fill: "var(--blue)", t: "أكثر من 8" },
            ];
            var legend = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--inkSoft);">' +
                legendItems.map(function(it) {
                    return '<div style="display:flex;align-items:center;gap:5px;">' +
                        '<span style="width:18px;height:18px;border-radius:50%;background:' + it.fill + ';' +
                        (it.empty ? "border:2px dashed var(--paperLine);" : "") + '"></span>' +
                        it.t +
                        '</div>';
                }).join("") +
                '<div style="font-size:11px;color:var(--inkSoft);">اضغط على الدائرة لتسجيل عدد الساعات (0 = غائب)</div>' +
                '</div>';

            var nDays = daysInMonth(ui.year, ui.month);
            var headCells = '<th style="position:sticky;right:0;background:var(--paperDark);min-width:100px;border-bottom:2px solid var(--ink);text-align:start;z-index:2;">العامل</th>';
            for (var d = 1; d <= nDays; d++) {
                headCells += '<th style="min-width:34px;color:var(--inkSoft);font-weight:600;border-bottom:2px solid var(--ink);font-size:11px;">' +
                    d + '</th>';
            }

            var rows = data.workers.map(function(w) {
                var key = attKey(w.id, ui.year, ui.month);
                var monthData = data.attendance[key] || {};
                var cells = '<td style="position:sticky;right:0;background:#fff;font-weight:700;text-align:start;white-space:nowrap;border-bottom:1px solid var(--paperLine);z-index:1;">' +
                    esc(w.name) + '</td>';
                for (var d2 = 1; d2 <= nDays; d2++) {
                    var h = monthData[String(d2)];
                    var st = dayCellStyle(h);
                    var label = st.empty ? "·" : (h === 0 ? "✕" : fmt(h));
                    var title = st.empty ? "لم يُسجَّل" : (h === 0 ? "غائب" : fmt(h) + " ساعة");
                    var style = st.empty ? "" : 'style="background:' + st.fill + ';color:' + st.color + ';"';
                    cells += '<td style="text-align:center;padding:2px;">' +
                        '<button class="dot stamp-btn ' + (st.empty ? "empty" : "") + '" ' + style +
                        ' title="' + title + '" data-action="open-day-modal" data-worker="' + w.id + '" data-day="' +
                        d2 + '">' + label + '</button>' +
                        '</td>';
                }
                return '<tr>' + cells + '</tr>';
            }).join("");

            return out + legend +
                '<div class="table-wrap">' +
                '<table><thead><tr>' + headCells + '</tr></thead>' +
                '<tbody>' + rows + '</tbody></table>' +
                '</div>';
        }

        /* ===== تبويب الرواتب ===== */
        function viewPayroll() {
            var out = viewMonthPicker();

            if (data.workers.length === 0) {
                return out +
                    '<div style="text-align:center;padding:40px 20px;color:var(--inkSoft);">' +
                    '<div style="font-size:48px;margin-bottom:12px;">💰</div>' +
                    '<p>لا يوجد عمال لحساب الرواتب.</p>' +
                    '</div>';
            }

            var payroll = computePayroll();
            var totals = computeTotals(payroll);

            var reportHeader = '<div class="card" style="margin-bottom:14px;">' +
                '<div class="display" style="font-size:20px;color:var(--ink);">تقرير رواتب ' + MONTHS_AR[ui.month - 1] + ' ' +
                ui.year + ' — ' + esc(data.companyName) + '</div>' +
                '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;">' +
                '<span>👥 <b>' + payroll.length + '</b> عامل</span>' +
                '<span>أساسي: <b>' + fmt(totals.basePay) + '</b></span>' +
                '<span>إضافي: <b style="color:var(--blue);">' + fmt(totals.overtimePay) + '</b></span>' +
                '<span>سلف: <b style="color:var(--oxblood);">' + fmt(totals.advance) + '</b></span>' +
                '<span style="font-size:15px;">الصافي الكلي: <b style="color:var(--orange);">' + fmt(totals.net) +
                '</b></span>' +
                '</div>' +
                '<div style="font-size:11px;color:var(--inkSoft);margin-top:6px;">يوم العمل = 8 ساعات · أجر الساعة = سعر اليوم ÷ 8</div>' +
                '</div>';

            var head = ["العامل", "سعر اليوم", "ساعات العمل", "أيام مدفوعة", "غياب",
                    "ساعات إضافية", "أجر إضافي", "الإجمالي", "سلفة/خصم", "الصافي"
                ]
                .map(function(h) { return '<th style="border-bottom:2px solid var(--ink);white-space:nowrap;">' + h +
                    '</th>'; }).join("");

            var rows = payroll.map(function(p) {
                return '<tr>' +
                    '<td style="font-weight:700;text-align:start;">' + esc(p.worker.name) + '</td>' +
                    '<td>' + fmt(p.worker.rate) + '</td>' +
                    '<td style="color:var(--green);font-weight:600;">' + fmt(p.workedHours) + '</td>' +
                    '<td>' + fmt(p.paidDays) + '</td>' +
                    '<td style="color:var(--oxblood);">' + p.absentDays + '</td>' +
                    '<td><input class="field no-print" data-commit="overtime" data-worker="' + p.worker.id +
                    '" type="number" min="0" step="0.5" value="' + (p.overtimeHours || "") +
                    '" placeholder="0" style="width:60px;padding:4px 6px;text-align:center;font-size:13px;" /></td>' +
                    '<td style="color:var(--blue);">' + fmt(p.overtimePay) + '</td>' +
                    '<td>' + fmt(p.gross) + '</td>' +
                    '<td><input class="field no-print" data-commit="advance" data-worker="' + p.worker.id +
                    '" type="number" step="0.5" value="' + (p.advance || "") +
                    '" placeholder="0" style="width:70px;padding:4px 6px;text-align:center;font-size:13px;" /></td>' +
                    '<td style="font-weight:800;color:var(--orange);font-size:15px;">' + fmt(p.net) +
                    '<div style="font-size:10px;color:var(--inkSoft);font-weight:400;">(' + daysHoursLabel(p
                        .totalHoursEquivalent) + ')</div></td>' +
                    '</tr>';
            }).join("");

            var foot = '<tr style="background:var(--paperDark);font-weight:800;border-top:2px solid var(--ink);">' +
                '<td colspan="6" style="text-align:end;font-size:14px;">الإجمالي</td>' +
                '<td style="color:var(--blue);">' + fmt(totals.overtimePay) + '</td>' +
                '<td>' + fmt(totals.gross) + '</td>' +
                '<td>' + fmt(totals.advance) + '</td>' +
                '<td style="color:var(--orange);font-size:16px;">' + fmt(totals.net) + '</td>' +
                '</tr>';

            return out + reportHeader +
                '<div class="table-wrap">' +
                '<table><thead><tr style="background:var(--paperDark);">' + head + '</tr></thead>' +
                '<tbody>' + rows + '</tbody>' +
                '<tfoot>' + foot + '</tfoot></table>' +
                '</div>' +
                '<div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">' +
                '<button class="btn-primary no-print" data-action="print" style="padding:10px 24px;">🖨 طباعة الكشف</button>' +
                '</div>';
        }

        /* ===== النوافذ المنبثقة ===== */
        function viewModals() {
            var out = "";

            // نافذة إدخال اليوم
            if (ui.dayModal) {
                var m = ui.dayModal;
                out += '<div class="overlay no-print" onclick="if(event.target===this)closeDayModal()">' +
                    '<div class="modal">' +
                    '<div class="display" style="font-size:22px;color:var(--orange);margin-bottom:2px;">📅 يوم ' + m.day +
                    ' — ' + esc(m.workerName) + '</div>' +
                    '<p style="margin:0 0 12px;font-size:13px;color:var(--inkSoft);">أدخل عدد ساعات العمل (0 = غائب، اترك فارغاً للحذف)</p>' +
                    '<input id="day-modal-input" class="field" type="number" min="0" step="0.5" value="' + esc(m.value) +
                    '" placeholder="عدد الساعات" style="width:100%;font-size:18px;text-align:center;margin-bottom:16px;" />' +
                    '<div style="display:flex;gap:10px;justify-content:space-between;">' +
                    '<button class="btn-ghost" data-action="close-day-modal">إلغاء</button>' +
                    '<button class="btn-primary" data-action="save-day-modal" style="padding:8px 24px;">💾 حفظ</button>' +
                    '</div>' +
                    '</div></div>';
            }

            // نافذة التأكيد
            if (ui.confirmModal) {
                out += '<div class="overlay no-print" onclick="if(event.target===this){ui.confirmModal=null;render();}">' +
                    '<div class="modal">' +
                    '<div class="display" style="font-size:22px;color:var(--orange);margin-bottom:6px;">⚠️ تأكيد</div>' +
                    '<p style="margin:0 0 20px;line-height:1.7;font-size:15px;">' + esc(ui.confirmModal.message) +
                    '</p>' +
                    '<div style="display:flex;gap:10px;justify-content:flex-end;">' +
                    '<button class="btn-ghost" data-action="confirm-no">إلغاء</button>' +
                    '<button class="btn-primary" data-action="confirm-yes" style="background:var(--oxblood);">تأكيد</button>' +
                    '</div>' +
                    '</div></div>';
            }

            // توست
            if (ui.toast) {
                out += '<div class="toast no-print">' + esc(ui.toast) + '</div>';
            }

            return out;
        }

        /* ============================================================
               ربط الأحداث
               ============================================================ */

        // ربط المدخلات التي تستخدم data-commit
        function bindInputs() {
            // المدخلات التي تحمل data-commit يتم ربطها عبر "change" و "blur"
            var inputs = document.querySelectorAll('[data-commit]');
            inputs.forEach(function(el) {
                // نمنع التكرار
                if (el._bound) return;
                el._bound = true;
                var handler = function() {
                    var commit = el.dataset.commit;
                    var val = el.value;
                    if (commit === "advance") setAdvance(el.dataset.worker, val);
                    else if (commit === "overtime") setOvertime(el.dataset.worker, val);
                    else if (commit === "company") setCompanyName(val);
                };
                el.addEventListener("change", handler);
                el.addEventListener("blur", handler);
            });
        }

        // تفويض الأحداث للنقرات
        document.addEventListener("click", function(e) {
            var btn = e.target.closest("[data-action]");
            if (!btn) return;
            var action = btn.dataset.action;

            // الأوامر السريعة
            if (action === "set-tab") {
                ui.tab = btn.dataset.tab;
                render();
                return;
            }
            if (action === "add-worker") { addWorker(); return; }
            if (action === "start-edit") { startEdit(btn.dataset.id); return; }
            if (action === "save-edit") { saveEdit(btn.dataset.id); return; }
            if (action === "cancel-edit") { cancelEdit(); return; }
            if (action === "delete-worker") { deleteWorker(btn.dataset.id); return; }
            if (action === "change-month") { changeMonth(parseInt(btn.dataset.delta, 10)); return; }
            if (action === "open-day-modal") {
                openDayModal(btn.dataset.worker, parseInt(btn.dataset.day, 10));
                return;
            }
            if (action === "save-day-modal") { saveDayModal(); return; }
            if (action === "close-day-modal") { closeDayModal(); return; }
            if (action === "confirm-yes") {
                var fn = ui.confirmModal && ui.confirmModal.onYes;
                ui.confirmModal = null;
                if (fn) fn();
                else render();
                return;
            }
            if (action === "confirm-no") {
                ui.confirmModal = null;
                render();
                return;
            }
            if (action === "reset-all") {
                askConfirm("سيتم حذف كل البيانات نهائياً (العمال، الحضور، السلف، الإضافي). متأكد؟", function() {
                    persist(JSON.parse(JSON.stringify(DEFAULT_DATA)));
                    notify("تم مسح جميع البيانات");
                });
                return;
            }
            if (action === "print") {
                window.print();
                return;
            }
        });

        // الضغط على Enter في نافذة اليوم
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                var target = e.target;
                if (target && target.id === "day-modal-input") {
                    e.preventDefault();
                    saveDayModal();
                    return;
                }
                // في حقول الإضافة (العمال) يمكن الضغط Enter للإضافة
                if (target && (target.id === "new-worker-name" || target.id === "new-worker-rate")) {
                    e.preventDefault();
                    addWorker();
                    return;
                }
            }
            // Escape لإغلاق النوافذ
            if (e.key === "Escape") {
                if (ui.dayModal) { closeDayModal();
                    e.preventDefault(); return; }
                if (ui.confirmModal) { ui.confirmModal = null;
                    render();
                    e.preventDefault(); return; }
            }
        });

        // إغلاق النوافذ بالنقر على الخلفية (يتم التعامل معه عبر onclick في الـ overlay)

        /* ============================================================
               بدء التشغيل
               ============================================================ */
        render();

        // تسجيل Service Worker
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function() {
                navigator.serviceWorker.register("sw.js").catch(function() {});
            });
        }
    </script>
</body>
</html>
